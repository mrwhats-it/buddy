<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Buddy</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <div id="threads">
        <div id="threads-header">
          <button id="new-thread" title="New chat" aria-label="New chat">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button id="collapse-sidebar" title="Collapse sidebar" aria-label="Collapse sidebar">
            <svg class="icon-collapse" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <svg class="icon-expand" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
        <ul id="thread-list"></ul>
      </div>

      <div id="context-menu" hidden>
        <button data-action="rename">Rename</button>
        <button data-action="delete">Delete</button>
      </div>

      <div id="chat">
        <div id="messages"></div>
        <div id="composer">
          <textarea id="input" placeholder="Ask about something you saved..." rows="1"></textarea>
          <button id="send" title="Send" aria-label="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <script src="../lib/marked.min.js"></script>
    <script src="../lib/backend-client.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
