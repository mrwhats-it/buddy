<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Buddy — Settings</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 460px;
        margin: 24px auto;
        color: #eee;
        background: #181818;
        padding: 0 16px;
      }
      h1 {
        font-size: 16px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-size: 12px;
        color: #aaa;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-top: 4px;
        background: #262626;
        border: 1px solid #444;
        border-radius: 4px;
        color: inherit;
        font-family: inherit;
        font-size: 13px;
      }
      button {
        margin-top: 16px;
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        background: #4f8cff;
        color: white;
        cursor: pointer;
      }
      #status {
        margin-top: 16px;
        padding: 10px;
        border-radius: 6px;
        font-size: 13px;
        white-space: pre-wrap;
      }
      .ok {
        background: #1e3a24;
        color: #8fdc9c;
      }
      .bad {
        background: #3a1e1e;
        color: #dc8f8f;
      }
      .hint {
        color: #777;
        font-weight: normal;
      }
    </style>
  </head>
  <body>
    <h1>Buddy settings</h1>
    <div id="status">Checking backend...</div>

    <label>Supermemory URL<input id="supermemory_url" placeholder="http://localhost:6767" /></label>
    <label
      >Supermemory API key <span class="hint">(printed to the terminal on first `buddy start`)</span
      ><input id="supermemory_api_key" type="password"
    /></label>

    <label
      >LLM provider
      <select id="provider">
        <option value="">Custom / other</option>
        <option value="groq">Groq</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="gemini">Gemini</option>
        <option value="ollama">Ollama (local)</option>
      </select>
    </label>

    <label>LLM base URL <span class="hint">(auto-filled for known providers)</span
      ><input id="llm_base_url" placeholder="https://api.groq.com/openai/v1"
    /></label>
    <label>LLM API key<input id="llm_api_key" type="password" /></label>

    <label id="model_select_label" style="display: none">LLM model
      <select id="llm_model_select"></select>
    </label>
    <label id="model_input_label">LLM model<input id="llm_model" placeholder="llama-3.3-70b-versatile" /></label>

    <button id="save">Save</button>
    <script src="../lib/backend-client.js"></script>
    <script src="options.js"></script>
  </body>
</html>
